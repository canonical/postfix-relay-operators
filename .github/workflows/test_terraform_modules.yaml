name: Terraform modules tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'postfix-relay-operator/terraform/**'
      - 'postfix-relay-configurator-operator/terraform/**'

jobs:
  terraform-tests:
    uses: canonical/operator-workflows/.github/workflows/terraform_modules_test.yaml@main
    secrets: inherit
    with:
      lxd-controller: true
      # postfix-relay-configurator-operator/terraform is excluded until the charm is published in CharmHub
      # postfix-relay-operator/terraform-product is excluded because it sources the opendkim module from
      # a private GitHub repository (canonical/opendkim) which is not accessible from CI runners
      terraform-directories: '["postfix-relay-operator/terraform"]'
